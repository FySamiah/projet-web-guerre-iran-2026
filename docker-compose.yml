version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: guerre_iran_db
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: guerre_iran
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    container_name: guerre_iran_bo
    restart: on-failure
    ports:
      - "8080:80"
    volumes:
      - ./backoffice/src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: guerre_iran
      DB_USER: user
      DB_PASS: password
    networks:
      - app-network

  frontoffice:
    build:
      context: ./frontoffice
      dockerfile: Dockerfile
    container_name: guerre_iran_fo
    restart: on-failure
    ports:
      - "8081:80"
    volumes:
      - ./frontoffice/src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: guerre_iran
      DB_USER: user
      DB_PASS: password
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge