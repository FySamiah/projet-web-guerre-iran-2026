version: '3.8'

services:
  db:
    image: mysql:8
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: guerre_iran
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  backoffice:
    build: ./backoffice
    container_name: backoffice
    ports:
      - "8080:80"
    volumes:
      - ./backoffice/src:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: guerre_iran
      DB_USER: user
      DB_PASS: password
    networks:
      - app-network

  frontoffice:
    build: ./frontoffice
    container_name: frontoffice
    ports:
      - "8081:80"
    volumes:
      - ./frontoffice/src:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: guerre_iran
      DB_USER: user
      DB_PASS: password
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network: