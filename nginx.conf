events {
    worker_connections 1024;
}

http {
    upstream backoffice {
        server guerre_iran_bo:80;
    }

    upstream frontoffice {
        server guerre_iran_fo:80;
    }

    server {
        listen 80;
        server_name _;

        # Routage des uploads (depuis backoffice)
        location /uploads/ {
            proxy_pass http://backoffice/uploads/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Routage du backoffice
        location /admin {
            proxy_pass http://backoffice/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Routage du frontoffice (par défaut)
        location / {
            proxy_pass http://frontoffice;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
